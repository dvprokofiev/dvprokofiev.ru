baseURL = 'https://dvprokofiev.ru/'
title = 'Даниил Прокофьев'
defaultContentLanguage = 'ru'
markup.goldmark.renderer.unsafe = true
defaultContentLanguageInSubdir = false  
disableLanguages = []

[languages]
  [languages.ru]
    languageName = 'Русский'
    weight = 1
    contentDir = 'content/ru'

  [languages.en]
    languageName = 'English'
    weight = 2
    contentDir = 'content/en'
    title = 'Daniil Prokofiev'

[languages.ru.menu]
  [[languages.ru.menu.main]]
    name = "Заметки"
    url = "/ru/posts/"
    weight = 1
  [[languages.ru.menu.main]]
    name = "Учеба"
    url = "/ru/studies/"
    weight = 1

[languages.en.menu]
  [[languages.en.menu.main]]
    name = "Blog"
    url = "/en/posts/"
    weight = 1