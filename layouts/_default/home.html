<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ .Title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="header-container" style="display: flex; flex-direction: row; gap: 8px;">
            <img src="/images/me.jpeg" alt="Даниил Прокофьев" class="avatar">
            <div class="header-text">
                <h1>{{ .Site.Title }}</h1>
            </div>
        </div>
    </header>
    <nav style="display: flex; flex-direction: row; gap: 8px;">
        {{ range .Site.Menus.main }}
            <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}

        <span style="margin: 0 10px; color: #ccc;">|</span>

        {{ if .IsTranslated }}
            {{ range .Translations }}
                <a href="{{ .Permalink }}">{{ .Language.LanguageName }}</a>
            {{ end }}
        {{ else }}
            <span>{{ .Language.LanguageName }}</span>
        {{ end }}
    </nav>
    <main>
        {{ .Content }}
    </main>
</body>
</html>
