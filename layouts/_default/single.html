<!DOCTYPE html>
<html>
<head>
    <title>{{ .Title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <a href="{{ .Site.Home.RelPermalink }}">← {{ T "take-me-home" }}</a>
    <article class="post-content">
        <h1>{{ .Title }}</h1>
        <p><i>{{ .Date.Format "02.01.2006" }}</i></p>
        <hr>
        {{ .Content }}
    </article>
    <p class="reply-via-email">
        <a href="mailto:d@dvprokofiev.ru?subject=Re: {{ .Title | default ( .Date.Format "02.01.2006") }}">
            {{i18n "leave_a_comment"}}
        </a>
    </p>
</body>
</html>
