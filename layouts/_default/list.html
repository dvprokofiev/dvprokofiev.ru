<!DOCTYPE html>
<html>
<head>
    <title>{{ .Title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <main>
        {{ .Content }}
    </main>
    {{ if .Pages }}
    <ul>
        {{ range .Pages }}
            <li>
                <a href="{{ .Permalink }}">{{ .Title }}</a>
                <time>{{ .Date.Format "02.01.2006" }}</time>
            </li>
        {{ end }}
    </ul>
    {{ end }}
    <hr>
    <a href="/">← На главную</a>
</body>
</html>
